<!doctype html><html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="col" style="gap:6px;width:340px">
    <label style="font:500 13px Inter;color:#1E2B22">Customer</label>
    <input value="GlobalMed" style="height:44px;padding:0 14px;background:#FFF;border:1px solid #E7D9D0;border-radius:10px;font:400 14px Inter;color:#1E2B22;outline:none"/>
  </div>
  <div class="col" style="gap:6px;width:340px">
    <label style="font:500 13px Inter;color:#1E2B22">Search the feed</label>
    <div style="display:flex;align-items:center;height:44px;padding:0 14px;background:#FFF;border:1px solid #3D5943;border-radius:10px;box-shadow:0 0 0 3px rgba(61,89,67,0.15);gap:10px">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#7A7670" stroke-width="1.4"/><path d="M11 11L14 14" stroke="#7A7670" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input placeholder="email, customer, RFQ-…" style="border:none;outline:none;flex:1;font:400 14px Inter;color:#1E2B22;background:transparent"/>
    </div>
  </div>
  <div class="mono">44 tall · radius 10 · border #E7D9D0 · focus = 1px forest border + 3px soft halo</div>
</div></body></html>
