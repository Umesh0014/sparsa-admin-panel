<!doctype html><html><head><meta charset="utf-8"><title>Feed card</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="background:#FFF;border:1px solid #E7D9D0;border-radius:8px;padding:18px 20px;display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="width:32px;height:32px;background:#F4EAE3;border-radius:6px;display:flex;align-items:center;justify-content:center">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2.5 4.5h11v7h-11z" stroke="#7A7670" stroke-width="1.3"/><path d="M2.5 4.5l5.5 4 5.5-4" stroke="#7A7670" stroke-width="1.3" stroke-linecap="round"/></svg>
      </div>
      <span style="font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase;color:#7A7670">EMAIL</span>
      <span style="font:500 12.5px Inter;color:#4A4E48">Tom Brennan</span>
      <span style="font:500 11.5px Inter;color:#A89D94;font-variant-numeric:tabular-nums lining-nums">06:12</span>
      <div style="flex:1"></div>
      <span style="padding:4px 10px;background:#F6EBE9;color:#B33A28;border-radius:999px;font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase">ACT NOW</span>
    </div>
    <div style="font:600 16px/140% Inter;color:#1E2B22">RE: Backup failure on production cluster — URGENT</div>
  </div>
</div></body></html>
