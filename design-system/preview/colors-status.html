<!doctype html><html><head><meta charset="utf-8"><title>Status / functional</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card white">
  <div class="row" style="gap:10px;align-items:center">
    <span style="padding:5px 10px;background:#F6EBE9;color:#B33A28;border-radius:999px;font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase">CRITICAL</span>
    <span style="padding:5px 10px;background:#F6EBE9;color:#B33A28;border-radius:999px;font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase">Act now</span>
    <span style="padding:5px 10px;background:#F6E9D2;color:#C28B3C;border-radius:999px;font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase">Decisions</span>
    <span style="padding:5px 10px;background:#DFE8DC;color:#4F7A55;border-radius:999px;font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase">Completed</span>
    <span style="padding:5px 10px;background:#F4EAE3;color:#7A7670;border-radius:999px;font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase">Monitor</span>
  </div>
  <div class="row" style="gap:18px">
    <div class="swatch"><div class="chip" style="background:#B33A28;border-color:#B33A28"></div><div class="name">Danger</div><div class="hex">#B33A28</div></div>
    <div class="swatch"><div class="chip" style="background:#C28B3C;border-color:#C28B3C"></div><div class="name">Warn</div><div class="hex">#C28B3C</div></div>
    <div class="swatch"><div class="chip" style="background:#4F7A55;border-color:#4F7A55"></div><div class="name">Success</div><div class="hex">#4F7A55</div></div>
  </div>
</div></body></html>
