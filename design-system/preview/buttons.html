<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card white">
  <div class="row" style="gap:12px;align-items:center">
    <button style="padding:10px 18px;background:#3D5943;border-radius:999px;border:none;color:#FBF4F1;font:500 14px Inter;cursor:pointer">Schedule emergency call</button>
    <button style="padding:10px 18px;background:transparent;border:1px solid #D9C7BA;border-radius:999px;color:#1E2B22;font:500 14px Inter;cursor:pointer">Escalate to Support</button>
    <button style="padding:10px 18px;background:#FBF4F1;border:1px solid #E7D9D0;border-radius:999px;color:#1E2B22;font:500 14px Inter;cursor:pointer">Cancel</button>
  </div>
  <div class="row" style="gap:12px;align-items:center">
    <button style="padding:8px 14px;background:#B33A28;border-radius:999px;border:none;color:#FBF4F1;font:500 13px Inter;cursor:pointer">Mark critical</button>
    <button style="padding:8px 14px;background:#F6EBE9;border:1px solid #E4C7BD;border-radius:999px;color:#B33A28;font:500 13px Inter;cursor:pointer">Reject</button>
    <button style="padding:8px 14px;background:transparent;border:1px solid #3D5943;border-radius:999px;color:#3D5943;font:500 13px Inter;cursor:pointer">Run analysis</button>
  </div>
  <div class="mono">Pill buttons · radius 999 · primary = forest green / paper text · ghost = 1px warm border · destructive = soft terracotta or solid terracotta</div>
</div></body></html>
