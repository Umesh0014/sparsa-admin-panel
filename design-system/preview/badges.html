<!doctype html><html><head><meta charset="utf-8"><title>Chips &amp; tabs</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row" style="gap:10px;align-items:center">
    <span style="padding:8px 16px;background:#3D5943;border-radius:999px;color:#FBF4F1;font:500 14px Inter">All&nbsp;&nbsp;<span style="opacity:.75">13</span></span>
    <span style="padding:8px 16px;background:transparent;border:1px solid #D9C7BA;border-radius:999px;color:#4A4E48;font:500 14px Inter">Email&nbsp;&nbsp;<span style="color:#7A7670">7</span></span>
    <span style="padding:8px 16px;background:transparent;border:1px solid #D9C7BA;border-radius:999px;color:#4A4E48;font:500 14px Inter">Slack&nbsp;&nbsp;<span style="color:#7A7670">4</span></span>
    <span style="padding:8px 16px;background:transparent;border:1px solid #D9C7BA;border-radius:999px;color:#4A4E48;font:500 14px Inter">Salesforce&nbsp;&nbsp;<span style="color:#7A7670">1</span></span>
  </div>
  <div class="row" style="gap:10px;align-items:center">
    <span style="padding:4px 10px;background:#F6EBE9;color:#B33A28;border-radius:999px;font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase">ACT NOW</span>
    <span style="padding:4px 10px;background:#F6E9D2;color:#C28B3C;border-radius:999px;font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase">BY 12:00</span>
    <span style="padding:4px 10px;background:#DFE8DC;color:#4F7A55;border-radius:999px;font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase">RESOLVED</span>
    <span style="padding:4px 10px;background:#F4EAE3;color:#7A7670;border-radius:999px;font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase">MONITOR</span>
  </div>
  <div class="mono">Tab pill · 8/16 · forest green active, cream-border inactive · Status chip · 4/10 · soft color bg + matching ink · 0.10em uppercase</div>
</div></body></html>
