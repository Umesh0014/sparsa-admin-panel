<!doctype html><html><head><meta charset="utf-8"><title>Terracotta accents</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row" style="gap:18px">
    <div class="swatch"><div class="chip" style="background:#B33A28;border-color:#B33A28"></div><div class="name">Terracotta</div><div class="hex">#B33A28</div></div>
    <div class="swatch"><div class="chip" style="background:#8E2D1E;border-color:#8E2D1E"></div><div class="name">Terra deep</div><div class="hex">#8E2D1E</div></div>
    <div class="swatch"><div class="chip" style="background:#F6EBE9"></div><div class="name">Terra soft</div><div class="hex">#F6EBE9</div></div>
    <div class="swatch"><div class="chip" style="background:#E4C7BD"></div><div class="name">Terra border</div><div class="hex">#E4C7BD</div></div>
    <div class="swatch"><div class="chip" style="background:#BD7A5E;border-color:#BD7A5E"></div><div class="name">Terra tan</div><div class="hex">#BD7A5E</div></div>
    <div class="swatch"><div class="chip" style="background:#CD8C6B;border-color:#CD8C6B"></div><div class="name">Salmon</div><div class="hex">#CD8C6B</div></div>
  </div>
  <div class="mono">Terracotta is the alarm bell — CRITICAL eyebrows, ACT NOW chips, left-edge rails on urgent cards. Used sparingly; signals importance. Salmon is for user avatars only.</div>
</div></body></html>
