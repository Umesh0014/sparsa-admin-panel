<!doctype html><html><head><meta charset="utf-8"><title>Metric cards</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row" style="gap:14px">
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;padding:18px 20px 20px;background:#FFF;border:1px solid #E7D9D0;border-radius:14px">
      <span style="font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase;color:#B33A28">CRITICAL</span>
      <span style="font:700 36px/100% Inter,sans-serif;color:#1E2B22;letter-spacing:-0.02em;font-variant-numeric:tabular-nums lining-nums">4</span>
      <span style="font:400 12.5px/140% Inter;color:#7A7670">Pipeline &amp; customer risk</span>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;padding:18px 20px 20px;background:#FFF;border:1px solid #E7D9D0;border-radius:14px">
      <span style="font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase;color:#7A7670">DECISIONS</span>
      <span style="font:700 36px/100% Inter,sans-serif;color:#1E2B22;letter-spacing:-0.02em;font-variant-numeric:tabular-nums lining-nums">4</span>
      <span style="font:400 12.5px/140% Inter;color:#7A7670">Pricing, territory, deals</span>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;padding:18px 20px 20px;background:#FFF;border:1px solid #E7D9D0;border-radius:14px">
      <span style="font:600 11px Inter;letter-spacing:0.10em;text-transform:uppercase;color:#7A7670">PIPELINE</span>
      <span style="font:700 36px/100% Inter,sans-serif;color:#1E2B22;letter-spacing:-0.02em;font-variant-numeric:tabular-nums lining-nums">$4.2M</span>
      <span style="font:400 12.5px/140% Inter;color:#7A7670">Active Q2 pipeline</span>
    </div>
  </div>
</div></body></html>
