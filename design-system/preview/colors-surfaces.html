<!doctype html><html><head><meta charset="utf-8"><title>Surfaces</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="row" style="gap:18px">
    <div class="swatch"><div class="chip" style="background:#FDF8F4"></div><div class="name">Paper</div><div class="hex">#FDF8F4</div></div>
    <div class="swatch"><div class="chip" style="background:#F8F0EA"></div><div class="name">Paper sunken</div><div class="hex">#F8F0EA</div></div>
    <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><div class="name">Surface</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch"><div class="chip" style="background:#FCF7F3"></div><div class="name">Surface warm</div><div class="hex">#FCF7F3</div></div>
    <div class="swatch"><div class="chip" style="background:#F0E5DC"></div><div class="name">Border</div><div class="hex">#F0E5DC</div></div>
    <div class="swatch"><div class="chip" style="background:#E5D5C8"></div><div class="name">Border strong</div><div class="hex">#E5D5C8</div></div>
  </div>
</div></body></html>
