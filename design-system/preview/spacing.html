<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head>
<body><div class="card white">
  <div class="row" style="gap:14px;align-items:flex-end">
    <div class="col" style="gap:6px;align-items:center"><div style="width:4px;height:36px;background:#3D5943"></div><div class="mono">4</div></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:8px;height:36px;background:#3D5943"></div><div class="mono">8</div></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:12px;height:36px;background:#3D5943"></div><div class="mono">12</div></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:16px;height:36px;background:#3D5943"></div><div class="mono">16</div></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:20px;height:36px;background:#3D5943"></div><div class="mono">20</div></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:24px;height:36px;background:#3D5943"></div><div class="mono">24</div></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:32px;height:36px;background:#3D5943"></div><div class="mono">32</div></div>
    <div class="col" style="gap:6px;align-items:center"><div style="width:48px;height:36px;background:#3D5943"></div><div class="mono">48</div></div>
  </div>
  <div style="font:400 14px/1.5 Inter;color:#4A4E48">4-step grid. Daily Feed is a centered <strong style="color:#1E2B22">~900px column</strong> over a cream background; cards stack with 16px gaps; sections separate at 32px. Header bar is exactly <strong style="color:#1E2B22">64px</strong> high.</div>
</div></body></html>
